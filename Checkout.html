<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Checkout - Yellowstock</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Checkout</h1>
  <a href="index.html">← Retour boutique</a>
</header>

<section style="max-width:800px; margin:auto; padding:30px;">

  <h2>🧾 Résumé de commande</h2>

  <div id="orderSummary"></div>

  <hr>

  <h2>📦 Informations client</h2>

  <input placeholder="Nom complet" style="width:100%; padding:10px; margin:5px 0;">
  <input placeholder="Adresse" style="width:100%; padding:10px; margin:5px 0;">
  <input placeholder="Email" style="width:100%; padding:10px; margin:5px 0;">

  <hr>

  <h2>💳 Paiement</h2>

  <button onclick="payStripe()">Payer maintenant</button>

</section>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let container = document.getElementById("orderSummary");
let total = 0;

cart.forEach(item => {
  container.innerHTML += `<p>${item.name} - ${item.price}€</p>`;
  total += item.price;
});

container.innerHTML += `<h3>Total : ${total}€</h3>`;

function payStripe() {
  alert("Redirection vers Stripe Checkout (mode démo)");

  // VRAI STRIPE :
  // window.location.href = "https://checkout.stripe.com/...";
}
</script>

</body>
</html>
