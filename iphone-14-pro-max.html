<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>iPhone 14 Pro Max - Yellowstock</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #ffffff;
  transition: background 0.4s ease;
}

/* =========================
   HEADER DOUBLÉ (Bandeau pro)
========================= */
header {
  position: sticky;
  top: 0;
  z-index: 1000;
}

.top-bar {
  background: rgba(0,0,0,0.9);
  color: white;
  padding: 12px;
  text-align: center;
  font-size: 13px;
}

.main-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 25px;
  background: rgba(20,20,20,0.95);
  color: white;
}

.logo {
  font-size: 26px;
  font-weight: bold;
  cursor: pointer;
}

/* =========================
   BOUTON PANIER (iPhone feel)
========================= */
.cart-btn {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  padding: 10px 14px;
  border-radius: 14px;
  cursor: pointer;
  transition: transform 0.15s ease;
  user-select: none;
}

.cart-btn:active {
  transform: scale(0.92);
}

/* =========================
   IMAGE
========================= */
.hero-img {
  width: 100%;
  max-height: 55vh;
  object-fit: cover;
}

/* =========================
   SECTION
========================= */
section {
  text-align: center;
  padding: 30px;
}

/* =========================
   BUTTON
========================= */
button {
  padding: 12px 18px;
  border: none;
  border-radius: 12px;
  background: #0071e3;
  color: white;
  cursor: pointer;
}

/* =========================
   OVERLAY (fond dynamique)
========================= */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255, 0, 200, 0);
  transition: 0.3s;
  z-index: 9998;
  pointer-events: none;
}

/* =========================
   PANIER (drawer fluide)
========================= */
.cart-modal {
  position: fixed;
  top: 0;
  right: 0;
  width: 80%;
  max-width: 420px;
  height: 100%;
  background: rgba(20,20,25,0.92);
  backdrop-filter: blur(18px);
  color: white;
  padding: 20px;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  z-index: 9999;
  overflow-y: auto;
}

.cart-modal.open {
  transform: translateX(0);
}

.cart-item {
  padding: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
</style>

</head>

<body>

<!-- HEADER DOUBLÉ -->
<header>
  <div class="top-bar">Livraison rapide • Garantie Apple-style</div>

  <div class="main-bar">
    <div class="logo" onclick="window.location.href='index.html'">
      Yellowstock
    </div>

    <div class="cart-btn" onclick="openCart()">
      🛒 <span id="cartCount">0</span>
    </div>
  </div>
</header>

<img src="iphone14promax.jpg" class="hero-img">

<section>
  <h1>iPhone 14 Pro Max</h1>
  <p style="color:#d00;">🔥 Grade Or — Quasi neuf</p>
  <h2>539€</h2>

  <button onclick="addToCart('iPhone 14 Pro Max', 539)">
    Ajouter au panier
  </button>
</section>

<div class="overlay" onclick="closeCart()"></div>

<div id="cartModal" class="cart-modal"></div>

<script>

let cart = JSON.parse(localStorage.getItem("ys_cart")) || [];

/* =========================
   AJOUT
========================= */
function addToCart(name, price) {
  cart.push({ name, price });
  saveCart();
  updateCartCount();
  openCart();
}

/* =========================
   SAVE
========================= */
function saveCart() {
  localStorage.setItem("ys_cart", JSON.stringify(cart));
}

/* =========================
   COUNT
========================= */
function updateCartCount() {
  document.getElementById("cartCount").innerText = cart.length;
}

/* =========================
   OPEN CART + FX
========================= */
function openCart() {
  document.querySelector(".cart-modal").classList.add("open");
  document.querySelector(".overlay").style.background = "rgba(255,0,180,0.15)";
  renderCart();
}

/* =========================
   CLOSE CART
========================= */
function closeCart() {
  document.querySelector(".cart-modal").classList.remove("open");
  document.querySelector(".overlay").style.background = "rgba(255,0,180,0)";
}

/* =========================
   RENDER
========================= */
function renderCart() {
  let modal = document.getElementById("cartModal");

  let total = 0;

  modal.innerHTML = "<h2>🛒 Panier</h2>";

  if (cart.length === 0) {
    modal.innerHTML += "<p>Vide</p>";
    return;
  }

  cart.forEach((item, i) => {
    total += item.price;

    modal.innerHTML += `
      <div class="cart-item">
        ${item.name} - ${item.price}€
        <br>
        <button onclick="removeItem(${i})">Supprimer</button>
      </div>
    `;
  });

  modal.innerHTML += `
    <hr>
    <h3>Total : ${total}€</h3>
    <button onclick="checkout()">💳 Payer</button>
    <button onclick="closeCart()">Fermer</button>
  `;
}

/* =========================
   REMOVE
========================= */
function removeItem(i) {
  cart.splice(i, 1);
  saveCart();
  updateCartCount();
  renderCart();
}

/* =========================
   CHECKOUT
========================= */
function checkout() {
  alert("Paiement simulé 💳");
  cart = [];
  saveCart();
  updateCartCount();
  renderCart();
  closeCart();
}

/* =========================
   SWIPE PROGRESSIF (0 → 66%)
========================= */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchmove", e => {
  let moveX = e.touches[0].clientX;
  let diff = startX - moveX;

  if (diff > 0 && diff < window.innerWidth * 0.66) {
    document.querySelector(".cart-modal").style.transform =
      `translateX(${100 - (diff / (window.innerWidth * 0.66)) * 100}%)`;

    document.body.style.background =
      `rgb(255, ${255 - diff * 0.3}, ${255 - diff * 0.2})`;
  }
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  let diff = startX - endX;

  if (diff > window.innerWidth * 0.3) {
    openCart();
  } else {
    closeCart();
  }
});

/* INIT */
window.onload = () => updateCartCount();

</script>

</body>
</html>
