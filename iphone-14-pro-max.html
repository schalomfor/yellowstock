<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Yellowstock - iPhone 14 Pro Max</title>

<style>
/* =========================
   BASE
========================= */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: rgb(181, 160, 140); /* marron mat */
  transition: background 0.3s ease;
}

/* =========================
   HEADER PRO
========================= */
header {
  position: sticky;
  top: 0;
  z-index: 1000;
}

.top-bar {
  background: #111;
  color: white;
  text-align: center;
  font-size: 12px;
  padding: 8px;
}

.main-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 22px;
  background: rgba(20,20,20,0.95);
  color: white;
}

.logo {
  font-size: 22px;
  font-weight: 700;
  cursor: pointer;
}

.cart-btn {
  background: rgba(255,255,255,0.15);
  padding: 10px 14px;
  border-radius: 12px;
  cursor: pointer;
  color: white;
}

/* =========================
   IMAGE PRODUIT
========================= */
.hero-img {
  width: 100%;
  max-height: 55vh;
  object-fit: cover;
  cursor: pointer;
  background: #222;
}

/* =========================
   SECTION
========================= */
section {
  text-align: center;
  padding: 30px;
}

button {
  padding: 12px 18px;
  border: none;
  border-radius: 12px;
  background: #0071e3;
  color: white;
  cursor: pointer;
}

/* =========================
   OVERLAY
========================= */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255,0,180,0);
  transition: 0.3s;
  z-index: 9998;
  pointer-events: none;
}

/* =========================
   CART DRAWER (66%)
========================= */
.cart-modal {
  position: fixed;
  top: 0;
  right: 0;
  width: 66%;
  max-width: 420px;
  height: 100%;
  background: rgba(35,30,28,0.92);
  backdrop-filter: blur(18px);
  color: white;
  padding: 20px;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  z-index: 9999;
  overflow-y: auto;
}

.cart-modal.open {
  transform: translateX(0);
}

.cart-item {
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding: 10px 0;
}
</style>

</head>

<body>

<!-- HEADER -->
<header>
  <div class="top-bar">Yellowstock • Premium iPhone Store</div>

  <div class="main-bar">
    <div class="logo" onclick="window.location.href='index.html'">
      Yellowstock
    </div>

    <div class="cart-btn" onclick="openCart()">
      🛒 <span id="cartCount">0</span>
    </div>
  </div>
</header>

<!-- IMAGE PRODUIT -->
<img id="productImage"
     src="iphone14_front.jpg"
     class="hero-img"
     onclick="changeImage()">

<section>
  <h1>iPhone 14 Pro Max</h1>
  <p style="color:#8b3a2e;">🔥 Grade Or — Quasi neuf</p>
  <h2>539€</h2>

  <button onclick="addToCart('iPhone 14 Pro Max', 539)">
    Ajouter au panier
  </button>
</section>

<!-- OVERLAY -->
<div class="overlay" onclick="closeCart()"></div>

<!-- CART -->
<div id="cartModal" class="cart-modal"></div>

<script>

/* =========================
   STATE
========================= */
let cart = JSON.parse(localStorage.getItem("ys_cart")) || [];
let startX = 0;
let imgIndex = 0;
let intensity = 0.13;

/* IMAGES PRODUIT */
const images = [
  "iphone14_front.jpg",
  "iphone14_side.jpg",
  "iphone14_back.jpg"
];

/* =========================
   INIT
========================= */
window.onload = () => {
  updateCartCount();
  applyBackground();

  const img = document.getElementById("productImage");
  if (img) img.src = images[0];
};

/* =========================
   BACKGROUND
========================= */
function applyBackground() {
  let r = 181 - intensity * 90;
  let g = 160 - intensity * 80;
  let b = 140 - intensity * 70;

  document.body.style.background = `rgb(${r},${g},${b})`;
}

/* =========================
   ADD TO CART
========================= */
function addToCart(name, price) {
  cart.push({ name, price });

  saveCart();
  updateCartCount();

  increaseIntensity(0.06);
  openCart();
}

/* =========================
   SAVE
========================= */
function saveCart() {
  localStorage.setItem("ys_cart", JSON.stringify(cart));
}

/* =========================
   COUNT
========================= */
function updateCartCount() {
  const el = document.getElementById("cartCount");
  if (el) el.innerText = cart.length;
}

/* =========================
   OPEN CART
========================= */
function openCart() {
  document.querySelector(".cart-modal").classList.add("open");
  document.querySelector(".overlay").style.pointerEvents = "auto";
  document.querySelector(".overlay").style.background = "rgba(255,0,180,0.12)";

  increaseIntensity(0.13);
  renderCart();
}

/* =========================
   CLOSE CART
========================= */
function closeCart() {
  document.querySelector(".cart-modal").classList.remove("open");
  document.querySelector(".overlay").style.pointerEvents = "none";
  document.querySelector(".overlay").style.background = "rgba(255,0,180,0)";

  intensity = 0.13;
  applyBackground();
}

/* =========================
   INTENSITY
========================= */
function increaseIntensity(v) {
  intensity += v;
  if (intensity > 0.19) intensity = 0.19;
  applyBackground();
}

/* =========================
   RENDER CART
========================= */
function renderCart() {
  const modal = document.getElementById("cartModal");

  let total = 0;

  modal.innerHTML = "<h2>🛒 Panier</h2>";

  if (cart.length === 0) {
    modal.innerHTML += "<p>Panier vide</p>";
    return;
  }

  cart.forEach((item, i) => {
    total += item.price;

    modal.innerHTML += `
      <div class="cart-item">
        <b>${item.name}</b><br>
        ${item.price}€
        <br>
        <button onclick="removeItem(${i})">Supprimer</button>
      </div>
    `;
  });

  modal.innerHTML += `
    <hr>
    <h3>Total : ${total}€</h3>
    <button onclick="checkout()">💳 Payer</button>
    <button onclick="closeCart()">Fermer</button>
  `;
}

/* =========================
   REMOVE
========================= */
function removeItem(i) {
  cart.splice(i, 1);
  saveCart();
  updateCartCount();
  renderCart();
}

/* =========================
   CHECKOUT
========================= */
function checkout() {
  alert("Paiement simulé 💳");

  cart = [];
  saveCart();
  updateCartCount();

  intensity = 0.13;
  applyBackground();

  renderCart();
  closeCart();
}

/* =========================
   IMAGE SWITCH
========================= */
function changeImage() {
  const img = document.getElementById("productImage");
  if (!img) return;

  imgIndex = (imgIndex + 1) % images.length;

  const test = new Image();
  test.src = images[imgIndex];

  test.onload = () => {
    img.src = images[imgIndex];
  };

  increaseIntensity(0.03);
}

/* =========================
   SWIPE 0 → 66%
========================= */
document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchmove", e => {
  const diff = startX - e.touches[0].clientX;
  const modal = document.querySelector(".cart-modal");

  if (!modal) return;

  if (diff > 0 && diff < window.innerWidth * 0.66) {
    modal.style.transform =
      `translateX(${100 - (diff / (window.innerWidth * 0.66)) * 100}%)`;
  }
});

document.addEventListener("touchend", e => {
  const diff = startX - e.changedTouches[0].clientX;

  if (diff > window.innerWidth * 0.25) openCart();
  else closeCart();
});

</script>

</body>
</html>
