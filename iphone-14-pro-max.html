<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>iPhone 14 Pro Max - Yellowstock</title>
<link rel="stylesheet" href="style.css">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  background: #b5b69e;
}

/* HEADER FIX */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 25px 30px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  color: white;
}

/* LOGO FIX */
.logo {
  font-size: 34px; /* ← AGRANDI */
  font-weight: 600;
  cursor: pointer;
}

/* PANIER */
.cart-btn {
  font-size: 20px;
  cursor: pointer;
}

/* MENU */
.top-nav {
  background: rgba(0,0,0,0.6);
  padding: 12px;
  text-align: center;
}

.top-nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

/* IMAGE */
.hero-img {
  width: 100%;
  max-height: 60vh;
  object-fit: cover;
}

/* SECTION */
section {
  text-align: center;
  padding: 25px;
}

/* BUTTON */
button {
  background: #0071e3;
  border: none;
  padding: 12px 20px;
  color: white;
  border-radius: 12px;
  cursor: pointer;
}

/* PANIER CORRIGÉ */
.cart-modal {
  position: fixed;
  top: 0;
  right: -350px;
  width: 350px;
  height: 100%;
  background: #d2a679; /* 🍫 CHOCOLAT CLAIR */
  color: black;
  padding: 20px;
  transition: right 0.3s ease;
  z-index: 2000;
}
</style>

</head>

<body>

<header>
  <div class="logo" onclick="window.location.href='index.html'">
    Yellowstock
  </div>

  <div class="cart-btn" onclick="toggleCart()">
    🛒 <span id="cartCount">0</span>
  </div>
</header>

<div class="top-nav">
  <a href="iphone-14-pro-max.html">14 Pro Max</a>
  <a href="iphone-15-pro.html">15 Pro</a>
  <a href="iphone-15-pro-max.html">15 Pro Max</a>
</div>

<img src="iphone14promax.jpg" class="hero-img">

<section>

  <h1>iPhone 14 Pro Max</h1>

  <p style="color:#ff3b30;">🔥 Grade Or — Quasi neuf</p>

  <h2>À partir de 499€</h2>

  <select id="storage" onchange="updatePrice()">
    <option value="499">128 Go - 499€</option>
    <option value="539" selected>256 Go - 539€</option>
    <option value="589">512 Go - 589€</option>
  </select>

  <h2 id="price">Prix : 539€</h2>

  <button onclick="addToCart('iPhone 14 Pro Max', getPrice())">
    Ajouter au panier
  </button>

</section>

<div id="cartModal" class="cart-modal"></div>

<script>
let cartOpen = false;

/* PANIER FIX */
function toggleCart() {
  const cart = document.getElementById("cartModal");

  if (!cartOpen) {
    cart.style.right = "0";
    cartOpen = true;
  } else {
    cart.style.right = "-350px";
    cartOpen = false;
  }

  renderCart();
}

/* SWIPE FIX (PANIER UNIQUEMENT) */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 100) {
    toggleCart(); // ouvrir
  }

  if (endX - startX > 100) {
    toggleCart(); // fermer
  }
});

/* PRIX */
function updatePrice() {
  const price = document.getElementById("storage").value;
  document.getElementById("price").innerText = "Prix : " + price + "€";
}

function getPrice() {
  return parseFloat(document.getElementById("storage").value);
}
</script>

<script src="script.js"></script>

</body>
</html>
