<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>iPhone 14 Pro Max - Yellowstock</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f2f2f2;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 25px;
  background: rgba(0,0,0,0.85);
  color: white;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.logo {
  font-size: 28px;
  font-weight: bold;
  cursor: pointer;
}

.cart-btn {
  font-size: 22px;
  cursor: pointer;
  background: white;
  color: black;
  padding: 8px 12px;
  border-radius: 12px;
}

/* IMAGE */
.hero-img {
  width: 100%;
  max-height: 55vh;
  object-fit: cover;
}

/* SECTION */
section {
  text-align: center;
  padding: 30px;
}

/* BOUTON */
button {
  padding: 12px 18px;
  border: none;
  border-radius: 12px;
  background: #0071e3;
  color: white;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  opacity: 0.9;
}

/* OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  z-index: 9998;
}

/* PANIER */
.cart-modal {
  position: fixed;
  top: 0;
  right: -420px;
  width: 380px;
  height: 100%;
  background: white;
  color: black;
  padding: 20px;
  transition: 0.3s ease;
  z-index: 9999;
  box-shadow: -10px 0 30px rgba(0,0,0,0.3);
  overflow-y: auto;
}

.cart-modal.active {
  right: 0;
}

.cart-item {
  margin-bottom: 12px;
  padding: 10px;
  border-bottom: 1px solid #eee;
}
</style>

</head>

<body>

<header>
  <div class="logo" onclick="window.location.href='index.html'">
    Yellowstock
  </div>

  <div class="cart-btn" onclick="openCart()">
    🛒 <span id="cartCount">0</span>
  </div>
</header>

<img src="iphone14promax.jpg" class="hero-img">

<section>
  <h1>iPhone 14 Pro Max</h1>
  <p style="color:#d00;">🔥 Grade Or — Quasi neuf</p>
  <h2>539€</h2>

  <button onclick="addToCart('iPhone 14 Pro Max', 539)">
    Ajouter au panier
  </button>
</section>

<!-- OVERLAY -->
<div class="overlay" onclick="closeCart()"></div>

<!-- PANIER -->
<div id="cartModal" class="cart-modal"></div>

<script>

/* =========================
   PANIER GLOBAL (LOCALSTORAGE)
========================= */
let cart = JSON.parse(localStorage.getItem("ys_cart")) || [];

/* =========================
   AJOUT PANIER
========================= */
function addToCart(name, price) {
  cart.push({ name, price });
  saveCart();
  updateCartCount();
  openCart();
}

/* =========================
   SAUVEGARDE
========================= */
function saveCart() {
  localStorage.setItem("ys_cart", JSON.stringify(cart));
}

/* =========================
   COMPTEUR
========================= */
function updateCartCount() {
  document.getElementById("cartCount").innerText = cart.length;
}

/* =========================
   OUVERTURE PANIER
========================= */
function openCart() {
  document.querySelector(".cart-modal").classList.add("active");
  document.querySelector(".overlay").style.display = "block";
  renderCart();
}

/* =========================
   FERMETURE PANIER
========================= */
function closeCart() {
  document.querySelector(".cart-modal").classList.remove("active");
  document.querySelector(".overlay").style.display = "none";
}

/* =========================
   AFFICHAGE PANIER
========================= */
function renderCart() {
  let modal = document.getElementById("cartModal");

  let total = 0;

  modal.innerHTML = `
    <h2>🛒 Panier</h2>
  `;

  if (cart.length === 0) {
    modal.innerHTML += "<p>Panier vide</p>";
    return;
  }

  cart.forEach((item, index) => {
    total += item.price;

    modal.innerHTML += `
      <div class="cart-item">
        <strong>${item.name}</strong><br>
        ${item.price}€
        <br>
        <button onclick="removeItem(${index})">Supprimer</button>
      </div>
    `;
  });

  modal.innerHTML += `
    <hr>
    <h3>Total : ${total}€</h3>
    <button onclick="checkout()">💳 Payer</button>
    <button onclick="closeCart()">Fermer</button>
  `;
}

/* =========================
   SUPPRESSION
========================= */
function removeItem(i) {
  cart.splice(i, 1);
  saveCart();
  updateCartCount();
  renderCart();
}

/* =========================
   PAIEMENT
========================= */
function checkout() {
  alert("Paiement simulé Yellowstock 💳");

  cart = [];
  saveCart();
  updateCartCount();
  renderCart();
  closeCart();
}

/* =========================
   SWIPE (FIABLE)
========================= */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 80) openCart();
  if (endX - startX > 80) closeCart();
});

/* INIT */
window.onload = () => {
  updateCartCount();
};

</script>

</body>
</html>
