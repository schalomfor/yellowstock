<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>iPhone 14 Pro Max - Yellowstock</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #b5b69e;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 25px;
  background: rgba(0,0,0,0.7);
  color: white;
}

.logo {
  font-size: 32px;
  font-weight: bold;
  cursor: pointer;
}

.cart-btn {
  font-size: 22px;
  cursor: pointer;
}

/* IMAGE */
.hero-img {
  width: 100%;
  max-height: 60vh;
  object-fit: cover;
}

/* SECTION */
section {
  text-align: center;
  padding: 30px;
}

/* BOUTONS */
button {
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  background: #0071e3;
  color: white;
  cursor: pointer;
}

/* PANIER */
.cart-modal {
  position: fixed;
  top: 0;
  right: -80%;
  width: 80%;
  height: 100%;
  background: #ccff00;
  color: black;
  padding: 20px;
  transition: 0.25s;
  z-index: 9999;
}
</style>

</head>

<body>

<header>
  <div class="logo" onclick="window.location.href='index.html'">
    Yellowstock
  </div>

  <div class="cart-btn" onclick="openCart()">
    🛒 <span id="cartCount">0</span>
  </div>
</header>

<img src="iphone14promax.jpg" class="hero-img">

<section>

  <h1>iPhone 14 Pro Max</h1>

  <p style="color:red;">🔥 Grade Or — Quasi neuf</p>

  <h2 id="price">539€</h2>

  <button onclick="confirmAdd('iPhone 14 Pro Max', 539)">
    Ajouter au panier
  </button>

</section>

<!-- PANIER -->
<div id="cartModal" class="cart-modal"></div>

<script>

/* =========================
   VARIABLES
========================= */
let cart = [];
let cartOpen = false;
let startX = 0;

/* =========================
   PANIER
========================= */

function openCart() {
  document.getElementById("cartModal").style.right = "0";
  cartOpen = true;
  renderCart();
}

function closeCart() {
  document.getElementById("cartModal").style.right = "-80%";
  cartOpen = false;
}

function confirmAdd(name, price) {
  if (!confirm("Ajouter ce produit au panier ?")) return;

  cart.push({ name, price });
  updateCartCount();
  openCart();
}

function updateCartCount() {
  document.getElementById("cartCount").innerText = cart.length;
}

function renderCart() {
  let modal = document.getElementById("cartModal");

  let total = 0;
  modal.innerHTML = "<h2>🛒 Panier</h2>";

  if (cart.length === 0) {
    modal.innerHTML += "<p>Panier vide</p>";
  }

  cart.forEach((item, index) => {
    total += item.price;

    modal.innerHTML += `
      <div style="margin-bottom:10px;">
        <p>${item.name} - ${item.price}€</p>
        <button onclick="removeItem(${index})">Supprimer</button>
      </div>
    `;
  });

  modal.innerHTML += `
    <hr>
    <h3>Total : ${total}€</h3>
    <button onclick="checkout()">💳 Payer</button>
    <button onclick="closeCart()">Fermer</button>
  `;
}

function removeItem(i) {
  cart.splice(i, 1);
  updateCartCount();
  renderCart();
}

function checkout() {
  alert("Connexion Stripe à faire");
}

/* =========================
   SWIPE
========================= */

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 80) openCart();
  if (endX - startX > 80) closeCart();
});

/* INIT */
window.onload = () => updateCartCount();

</script>

</body>
</html>
